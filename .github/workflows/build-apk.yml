name: Build APK

on:
  push:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Generate Gradle Wrapper
        run: |
          cd android
          gradle wrapper --gradle-version=8.2
          chmod +x gradlew

      - name: Generate Keystore
        run: |
          keytool -genkey -v -keystore /tmp/keystore.jks \
            -alias gamekey -keyalg RSA -keysize 2048 \
            -validity 10000 \
            -storepass '${{ secrets.KEYSTORE_PASSWORD || 'android' }}' \
            -keypass '${{ secrets.KEY_PASSWORD || 'android' }}' \
            -dname "CN=Fred Felix, OU=GameDev, O=KriStof3r, L=City, ST=State, C=IT"

      - name: Build Release APK
        env:
          KEYSTORE_PATH: /tmp/keystore.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD || 'android' }}
          KEY_ALIAS: gamekey
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD || 'android' }}
        run: |
          cd android
          ./gradlew assembleRelease

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: game-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error
